# Interstellar Foundry — UAV Detection System
# ROS2 parameter configuration
# Platform: ROS2 Humble · Ubuntu 22.04 · Jetson Orin Nano

radar_node:
  ros__parameters:
    serial_port: /dev/ttyTHS1   # UART port on Jetson (Jetson ttyTHS1 = 40-pin header UART)
    baud_rate: 115200
    frame_id: radar_frame
    publish_rate_hz: 10.0
    sim_mode: false             # Set true for Mac dev / testing without hardware

camera_node:
  ros__parameters:
    frame_id: camera_frame
    fps: 30
    width: 640
    height: 400
    sim_mode: false

fusion_node:
  ros__parameters:
    depth_match_threshold_m: 1.5   # Max radar-camera range diff for cross-validation
    radar_buffer_sec: 0.5          # How long to keep radar points in memory
    min_snr: 0.4                   # Minimum radar signal-to-noise to process

detection_node:
  ros__parameters:
    snr_threshold: 0.5             # Minimum SNR for classification
    depth_validated_bonus: 0.15    # Confidence boost when camera confirms radar
    alert_range_m: 20.0            # Within this range → THREAT alert

dashboard_bridge:
  ros__parameters:
    ws_port: 9090                  # WebSocket port for dashboard
    broadcast_rate_hz: 5.0         # How often to push state to browser
